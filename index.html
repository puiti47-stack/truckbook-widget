<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruckBook Live</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: transparent;
}

.widget {
  width: 320px;
  padding: 18px;
  border-radius: 18px;
  background: rgba(0,0,0,0.85);
  color: white;
  text-align: center;
  backdrop-filter: blur(10px);
}

.value {
  font-size: 28px;
  font-weight: bold;
  margin: 6px 0;
}

.label {
  font-size: 13px;
  opacity: 0.6;
}

.green {
  color: #00ffcc;
}

.live {
  font-size: 12px;
  margin-bottom: 10px;
  color: red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}
</style>

</head>

<body>

<div class="widget">

<div class="live">● LIVE</div>

<div class="label">Pseudo</div>
<div class="value" id="pseudo">...</div>

<div class="label">Classement</div>
<div class="value green" id="rank">...</div>

<div class="label">Kilomètres</div>
<div class="value green" id="km">...</div>

</div>

<script>

const url = "https://trucksbook.eu/profile/513651";
const proxy = "https://api.allorigins.win/raw?url=";

async function updateData() {
  try {
    const response = await fetch(proxy + encodeURIComponent(url));
    const text = await response.text();

    // pseudo auto
    const pseudoMatch = text.match(/<title>(.*?)\s*\|\s*TrucksBook/i);
    if (pseudoMatch) {
      document.getElementById("pseudo").innerText = pseudoMatch[1];
    }

    // classement
    const rankMatch = text.match(/#(\d+)/);
    if (rankMatch) {
      document.getElementById("rank").innerText = "#" + rankMatch[1];
    }

    // kilomètres
    const kmMatch = text.match(/([\d\s]+)\s?km/i);
    if (kmMatch) {
      document.getElementById("km").innerText = kmMatch[1] + " km";
    }

  } catch (e) {
    document.getElementById("pseudo").innerText = "Erreur";
  }
}

setInterval(updateData, 8000);
updateData();

</script>

</body>
</html>
