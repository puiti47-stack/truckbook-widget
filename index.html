<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrucksBook Live</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }
    .widget {
      width: 360px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(10, 10, 14, 0.88);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 12px 40px rgba(0,0,0,0.35);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
    }
    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      font-size: 18px;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      font-size: 12px;
      font-weight: 700;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff3b30;
      animation: blink 1s infinite;
    }
    .main-card {
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .label {
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 5px;
    }
    .pseudo {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .stat {
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .stat-title {
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }
    .rank-note {
      margin-top: 7px;
      font-size: 11px;
      opacity: 0.65;
    }
    .progress-wrap {
      margin-top: 16px;
    }
    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 8px;
    }
    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 30%;
      border-radius: 999px;
      background: linear-gradient(90deg, #00d1ff, #00ffcc);
    }
    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 11px;
      opacity: 0.62;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.35; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">🚛</div>
        <div>TRUCKSBOOK LIVE</div>
      </div>
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>
    </div>

    <div class="main-card">
      <div class="label">Pseudo</div>
      <div class="pseudo">Benoît Riddick</div>

      <div class="grid">
        <div class="stat">
          <div class="stat-title">Classement</div>
          <div class="stat-value">#13</div>
          <div class="rank-note">Valeur actuelle</div>
        </div>

        <div class="stat">
          <div class="stat-title">Kilomètres</div>
          <div class="stat-value">55 551 km</div>
          <div class="rank-note">Distance totale</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-head">
          <span>Progression visuelle</span>
          <span>30%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>Connecté</span>
      <span id="heure"></span>
    </div>
  </div>

  <script>
    function updateClock() {
      document.getElementById("heure").textContent =
        new Date().toLocaleTimeString("fr-FR");
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
